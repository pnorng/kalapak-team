name: kalapak_mobile
description: Kalapak Code Team — Blog & Portfolio Mobile App. Cambodia 🇰🇭 Since 2024.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # HTTP & API
  dio: ^5.4.3
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.2.0

  # UI & Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_staggered_grid_view: ^0.7.0

  # Markdown
  flutter_markdown: ^0.6.22

  # Icons & Fonts
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0

  # Utilities
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/members/
    - assets/images/projects/
